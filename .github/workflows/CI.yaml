name: CI

on:
  push:
    branches:
      - main

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-bundle
            bundle_path: target/dx/RejectionRoulette/release/bundle/deb/*.deb
            bundle_args: --package-types "deb"
          - os: windows-latest
            artifact_name: windows-bundle
            bundle_path: target/dx/RejectionRoulette/release/bundle/msi/*.msi
            bundle_args: --package-types "msi"
          - os: macos-latest
            artifact_name: macos-bundle
            bundle_path: target/dx/RejectionRoulette/release/bundle/osx/*.dmg
            bundle_args: --package-types "dmg"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev desktop-file-utils

      - name: Run Dioxus Bundle
        run: dx bundle --release --desktop ${{ matrix.bundle_args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
