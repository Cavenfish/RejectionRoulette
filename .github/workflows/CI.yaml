name: CI

on:
  push:
    branches:
      - main

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-bundle
            bundle_path: /Users/runner/work/RejectionRoulette/RejectionRoulette/target/dx/RejectionRoulette/bundle/linux/deb/*.deb
            bundle_args: --package-types "deb"
            command: sudo apt update && sudo apt install pkg-config libssl-dev libgtk-3-dev xdotool libwebkit2gtk-4.1-dev libgtk-3-0 libxdo-dev

          - os: windows-latest
            artifact_name: windows-bundle
            bundle_path: D:\a\RejectionRoulette\RejectionRoulette\target\dx\RejectionRoulette\bundle\windows\msi\*.msi
            bundle_args: --package-types "msi"

          - os: macos-latest
            artifact_name: macos-bundle
            bundle_path: /Users/runner/work/RejectionRoulette/RejectionRoulette/target/dx/RejectionRoulette/bundle/macos/macos/*.dmg
            bundle_args: --package-types "dmg"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - run: ${{matrix.command}}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli

      - name: Run Dioxus Bundle
        run: dx bundle --release --desktop ${{ matrix.bundle_args }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
